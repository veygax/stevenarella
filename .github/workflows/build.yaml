name: Build
on:
  push:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          # TODO: refactor toolchain version
          toolchain: 1.64.0
          components: clippy, rustfmt
          default: true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-composite0-dev
      - name: Build binary
        run: |
          cargo build --verbose --release
      - name: Check workflow permissions
        id: check_permissions
        uses: scherermichael-oss/action-has-permission@1.0.6
        with:
          required-permission: write
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run clippy manually without annotations
        if: ${{ !steps.check_permissions.outputs.has-permission }}
        run: cargo clippy --all-targets -- -D warnings
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: stevenarella-linux
          path: target/release/stevenarella

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          # TODO: refactor toolchain version
          toolchain: 1.64.0
          components: clippy, rustfmt
          default: true
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.3.0
        with:
          version: 'v0.10.0'
      - name: Build binary
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-bindgen-cli
          wasm-pack build --dev
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: stevenarella.wasm
          path: target/wasm32-unknown-unknown/debug/stevenarella.wasm

